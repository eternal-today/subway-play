<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>지하철 놀이 🚇</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif; background: #f4f6f8; color: #222; overscroll-behavior: none; }
  
  /* Header UI */
  header { position: sticky; top: 0; z-index: 10; background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%); border-bottom: 1px solid #e5e7eb; padding: 12px 14px 0; }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-bottom: 12px; }
  .title { display: flex; align-items: center; gap: 10px; }
  .line-badge { width: 36px; height: 36px; border-radius: 50%; background: var(--line-color, #CD7C2F); color: white; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
  .title-text { font-size: 17px; font-weight: 700; }
  .subtitle { font-size: 12px; color: #6b7280; margin-top: 2px; }
  
  /* Controls */
  .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .line-select { padding: 7px 10px; border-radius: 10px; border: 1px solid #d1d5db; background: white; font-size: 14px; font-weight: 600; }
  .icon-btn { padding: 7px 11px; border-radius: 10px; border: 1px solid #d1d5db; background: white; font-size: 13px; font-weight: 600; cursor: pointer; }
  .icon-btn.primary { background: var(--line-color, #CD7C2F); color: white; border-color: transparent; }
  .stop-btn { padding: 7px 11px; border-radius: 10px; border: none; background: #ef4444; color: white; font-weight: 600; font-size: 13px; cursor: pointer; display: none; }
  .stop-btn.active { display: inline-block; }
  
  /* Auto Panel */
  .auto-panel { padding: 12px 0; border-top: 1px solid #e5e7eb; display: none; flex-wrap: wrap; gap: 8px; align-items: center; }
  .auto-panel.open { display: flex; }
  .auto-panel label { font-size: 12px; color: #4b5563; font-weight: 600; }
  .auto-panel select { padding: 7px 10px; border-radius: 8px; border: 1px solid #d1d5db; background: white; font-size: 13px; min-width: 110px; }
  .auto-panel .hint { font-size: 11px; color: #6b7280; flex-basis: 100%; margin-top: 4px; }
  .speed-control { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
  .speed-control select { padding: 4px 6px; border-radius: 6px; border: 1px solid #d1d5db; background: white; font-size: 12px; }

  /* LED Display Board */
  .led-board { background: #111; color: #ff9900; height: 36px; overflow: hidden; position: relative; border-radius: 4px; border: 2px solid #333; margin-bottom: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
  .led-text { position: absolute; white-space: nowrap; font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 16px; line-height: 32px; letter-spacing: 1px; transform: translateX(100%); text-shadow: 0 0 4px #ff9900; }
  .led-board.active .led-text { animation: scrollLeft 8s linear infinite; }
  @keyframes scrollLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-150%); } }

  /* Map & Stations */
  main { padding: 14px 12px 100px; max-width: 720px; margin: 0 auto; }
  .helper { background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; padding: 10px 14px; border-radius: 12px; font-size: 12.5px; margin-bottom: 14px; line-height: 1.5; }
  .map { position: relative; padding-left: 56px; }
  .line-track { position: absolute; left: 30px; top: 22px; bottom: 22px; width: 8px; background: var(--line-color, #CD7C2F); border-radius: 4px; z-index: 0; }
  
  .station { position: relative; display: flex; align-items: center; gap: 12px; padding: 8px 12px 8px 0; margin-left: -34px; cursor: pointer; border-radius: 12px; transition: background 0.15s, transform 0.1s; user-select: none; }
  .station:hover { background: rgba(0,0,0,0.03); }
  .station:active { transform: scale(0.98); }
  .station.active { background: color-mix(in srgb, var(--line-color, #CD7C2F) 14%, transparent); }
  
  .dot { flex: 0 0 auto; width: 22px; height: 22px; border-radius: 50%; background: white; border: 5px solid var(--line-color, #CD7C2F); box-shadow: 0 1px 2px rgba(0,0,0,0.1); z-index: 2; transition: transform 0.2s; position: relative; }
  .station.active .dot { transform: scale(1.25); box-shadow: 0 0 0 6px color-mix(in srgb, var(--line-color, #CD7C2F) 25%, transparent); }
  .dot.transfer { width: 26px; height: 26px; border-width: 4px; background: white; }
  .dot.transfer::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--line-color, #CD7C2F); opacity: 0.18; }
  .dot.terminal { background: var(--line-color, #CD7C2F); }
  
  /* Train Icon */
  .train-icon { position: absolute; left: 22px; transform: translate(-50%, -50%); width: 44px; height: 26px; background: var(--line-color, #CD7C2F); border-radius: 6px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; z-index: 5; transition: top 0.6s cubic-bezier(0.45, 0, 0.55, 1); pointer-events: none; opacity: 0; }
  .train-icon::after { content: '🪟'; font-size: 10px; letter-spacing: 2px; }
  .train-icon.visible { opacity: 1; }
  
  .station-info { flex: 1; min-width: 0; }
  .station-name-ko { font-size: 18px; font-weight: 700; color: #111827; line-height: 1.2; }
  .station-name-en { font-size: 12px; color: #6b7280; margin-top: 2px; }
  
  .transfers { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .transfer-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px; font-size: 11px; font-weight: 700; color: white; }
  
  .play-icon { flex: 0 0 auto; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; font-size: 18px; }
  .station.active .play-icon { opacity: 1; }
  
  .loop-section { border: 2px dashed color-mix(in srgb, var(--line-color, #CD7C2F) 40%, white); border-radius: 16px; padding: 6px 0; margin-bottom: 8px; margin-left: -10px; padding-left: 10px; position: relative; }
  .loop-label { position: absolute; top: -10px; right: 16px; background: white; padding: 0 8px; font-size: 11px; font-weight: 700; color: var(--line-color, #CD7C2F); }
  
  /* Door Overlay Effect */
  .door-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 15; display: none; }
  .door-overlay.show { display: block; }
  .door-side { position: absolute; top: 0; bottom: 0; width: 60px; background: linear-gradient(90deg, rgba(17,24,39,0.7), transparent); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .door-side.left { left: 0; transform: translateX(-100%); border-right: 4px solid #ef4444; }
  .door-side.right { right: 0; background: linear-gradient(270deg, rgba(17,24,39,0.7), transparent); transform: translateX(100%); border-left: 4px solid #ef4444; }
  .door-overlay.show .door-side.active { transform: translateX(0); }
</style>

<header style="--line-color: #CD7C2F">

      <div>

      </div>
    </div>
    <div class="controls">

    <div class="led-text" id="ledText">안전하고 편리한 지하철을 이용해 주셔서 감사합니다.</div>
  </div>

  <div class="auto-panel" id="autoPanel">
    <label>출발</label><select id="autoStart"></select>
    <label>도착</label><select id="autoEnd"></select>
    <button class="icon-btn primary" id="autoPlayBtn">▶ 출발</button>
    <div class="hint">기차가 자동으로 역마다 멈추며 안내방송을 합니다.</div>
  </div>
</header>

<main>
  <div class="helper">
    💡 <b>역 탭</b>: 딩동 소리와 함께 안내방송 자동 재생 (다시 탭하면 정지)<br>
    🚂 <b>자동운행</b>: 출발/도착역을 고르면 기차가 차임벨과 함께 이동해요
  </div>

<div class="door-overlay" id="doorOverlay">

// 데이터 간소화 (enSay 제거)

let currentLine = '6', currentStationIdx = -1, isPlaying = false, speechRate = 0.95;
let koreanVoice = null, englishVoice = null, autoMode = false, autoCancel = false, audioCtx = null;

// 보이스 로드 (한글, 영문 최적화)
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  koreanVoice = voices.find(v => v.lang === 'ko-KR' && /female|여성|Yuna|Heami/i.test(v.name)) || voices.find(v => v.lang === 'ko-KR');
  englishVoice = voices.find(v => v.lang === 'en-US' && /female|samantha|Karen/i.test(v.name)) || voices.find(v => v.lang === 'en-US');
}
loadVoices();
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = loadVoices;

// 오디오 컨텍스트 활성화
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) { return null; } }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// 실제 지하철 느낌의 차임벨 생성기
function playSubwayChime(isTransfer) {
  const ctx = ensureAudio(); 
  if (!ctx) return Promise.resolve();
  
  const now = ctx.currentTime;
  // 환승역이면 4음계 멜로디(솔-도-미-솔), 일반역이면 2음계(딩-동)
  const freqs = isTransfer ? [392.00, 523.25, 659.25, 783.99] : [659.25, 523.25];
  const noteDuration = 1.2;
  const noteSpacing = isTransfer ? 0.2 : 0.4;
  
  freqs.forEach((f, i) => {
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc1.type = 'sine';
    osc2.type = 'triangle'; // 전자음 느낌 혼합
    osc1.frequency.value = f;
    osc2.frequency.value = f;
    
    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(ctx.destination);
    
    const startTime = now + (i * noteSpacing);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.02); // 타격감
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration); // 잔향
    
    osc1.start(startTime);
    osc2.start(startTime);
    osc1.stop(startTime + noteDuration);
    osc2.stop(startTime + noteDuration);
  });
  
  const totalMs = (freqs.length * noteSpacing + 0.8) * 1000;
  return new Promise(res => setTimeout(res, totalMs));
}

// 안내방송 텍스트 및 속성 생성
function buildAnnouncementChunks(station) {
  const chunks = [];
  const isTransfer = station.transfers && station.transfers.length > 0;
  
  // 1. 한국어 텍스트 (쉼표를 활용하여 자연스럽게 끊어 읽기)
  let koText;
  if (isTransfer) {
    const tt = station.transfers.map(t => TRANSFER_NAMES_KO[t] || (t+'호선')).join(', ');
    koText = `이번 역은, ${tt}로 갈아타실 수 있는, ${station.name}, ${station.name}, 역입니다.`;
  } else {
    koText = `이번 역은, ${station.name}, ${station.name}, 역입니다.`;
  }
  
  if (station.doorDirection === 'left') koText += ' 내리실 문은, 왼쪽입니다.';
  else if (station.doorDirection === 'right') koText += ' 내리실 문은, 오른쪽입니다.';
  
  chunks.push({ text: koText, lang: 'ko-KR', voice: koreanVoice });

  // 2. 영어 텍스트 (문장 형태로 결합하여 영어 음성이 온전히 읽도록 처리)
  let enText = `This stop is, ${station.nameEn}. ${station.nameEn}.`;
  if (isTransfer) {
    const tt = station.transfers.map(t => TRANSFER_NAMES_EN[t] || t).join(', ');
    enText += ` You can transfer to, ${tt}.`;
  }
  
  if (station.doorDirection === 'left') enText += ' The doors are on your left.';
  else if (station.doorDirection === 'right') enText += ' The doors are on your right.';
  
  chunks.push({ text: enText, lang: 'en-US', voice: englishVoice });
  
  return chunks;
}

// 음성 발화 (순차 실행)
function speakChunk(chunk) {
  return new Promise(resolve => {
    if (!chunk.text) { resolve(); return; }
    const u = new SpeechSynthesisUtterance(chunk.text);
    u.lang = chunk.lang; 
    u.rate = speechRate; 
    
    if (chunk.voice) u.voice = chunk.voice;
    
    // 약간의 딜레이를 주어 문장 사이 호흡 마련
    u.onend = () => setTimeout(resolve, 300);
    u.onerror = () => resolve();
    speechSynthesis.speak(u);
  });
}

async function speakChain(chunks) {
  for (const chunk of chunks) {
    if (!isPlaying && !autoMode) return;
    if (autoCancel) return;
    await speakChunk(chunk);
  }
}

// 안내방송 실행 메인 함수
async function announce(idx) {
  const line = lineData[currentLine];
  const station = line.stations[idx];
  if (!station) return;
  
  if (isPlaying && currentStationIdx === idx && !autoMode) { stopAnnounce(); return; }
  
  stopAnnounce();
  ensureAudio();
  
  currentStationIdx = idx; 
  isPlaying = true; 
  autoCancel = false;
  
  updateUI();
  setLedBoard(`이번 역은 ${station.name} 역입니다. This stop is ${station.nameEn}.`);
  moveTrainTo(idx);
  
  // 차임벨 재생 (환승역 여부에 따라 멜로디 변경)
  const isTransfer = station.transfers.length > 0;
  await playSubwayChime(isTransfer);
  
  if (autoCancel) return;
  showDoor(station.doorDirection);
  
  await speakChain(buildAnnouncementChunks(station));
  
  hideDoor();
  if (!autoMode) { isPlaying = false; currentStationIdx = -1; updateUI(); setLedBoard('안전하고 편리한 지하철을 이용해 주셔서 감사합니다.'); }
}

async function startAutoRun() {
  const line = lineData[currentLine];
  const startIdx = parseInt(document.getElementById('autoStart').value);
  const endIdx = parseInt(document.getElementById('autoEnd').value);
  
  if (isNaN(startIdx) || isNaN(endIdx) || startIdx === endIdx) { alert('출발역과 도착역을 다르게 골라주세요!'); return; }
  
  stopAnnounce();
  await new Promise(r => setTimeout(r, 100));
  
  autoMode = true; autoCancel = false; isPlaying = true;
  updateUI();
  
  const step = startIdx < endIdx ? 1 : -1;
  let idx = startIdx;
  
  while (idx !== endIdx + step) {
    if (autoCancel) break;
    currentStationIdx = idx; updateUI(); moveTrainTo(idx);
    
    setLedBoard(`이번 역은 ${line.stations[idx].name} 역입니다.`);
    const isTransfer = line.stations[idx].transfers.length > 0;
    await playSubwayChime(isTransfer);
    
    if (autoCancel) break;
    showDoor(line.stations[idx].doorDirection);
    await speakChain(buildAnnouncementChunks(line.stations[idx]));
    hideDoor();
    
    if (autoCancel) break;
    if (idx !== endIdx) {
      setLedBoard('열차가 곧 출발합니다. 출입문 닫힙니다.');
      await new Promise(r => setTimeout(r, 1000));
      
      const nextStation = line.stations[idx + step];
      setLedBoard(`다음 역은 ${nextStation.name} 역입니다.`);
      await speakChunk({ text: `다음 역은, ${nextStation.name}, ${nextStation.name}, 역입니다.`, lang: 'ko-KR', voice: koreanVoice });
      
      if (autoCancel) break;
      await new Promise(r => setTimeout(r, 800));
    }
    idx += step;
  }
  
  setLedBoard(autoCancel ? '운행이 중단되었습니다.' : '종착역에 도착했습니다. 안녕히 가십시오.');
  await new Promise(r => setTimeout(r, 2000));
  
  autoMode = false; isPlaying = false; currentStationIdx = -1;
  hideTrain(); updateUI(); setLedBoard('안전하고 편리한 지하철을 이용해 주셔서 감사합니다.');
}

function stopAnnounce() {
  speechSynthesis.cancel();
  autoCancel = true; isPlaying = false; autoMode = false; currentStationIdx = -1;
  hideDoor(); hideTrain(); updateUI();
  setLedBoard('안전하고 편리한 지하철을 이용해 주셔서 감사합니다.');
}

// UI 렌더링 및 제어 함수들
function moveTrainTo(idx) {
  const train = document.getElementById('trainIcon');
  const target = Array.from(document.querySelectorAll('.station')).find(el => parseInt(el.dataset.idx) === idx);
  if (!target) return;
  const map = document.getElementById('map');
  const mapRect = map.getBoundingClientRect();
  const targetRect = target.getBoundingClientRect();
  train.style.top = (targetRect.top - mapRect.top + targetRect.height / 2) + 'px';
  train.classList.add('visible');
  target.scrollIntoView({ behavior:'smooth', block:'center' });
}

function hideTrain() { document.getElementById('trainIcon').classList.remove('visible'); }

function showDoor(direction) {
  if (!direction) direction = 'right'; // 기본 애니메이션 방향
  const left = document.getElementById('doorLeft'), right = document.getElementById('doorRight');
  left.classList.remove('active'); right.classList.remove('active');
  if (direction === 'left') left.classList.add('active');
  if (direction === 'right') right.classList.add('active');
  document.getElementById('doorOverlay').classList.add('show');
}
function hideDoor() { document.getElementById('doorOverlay').classList.remove('show'); }

function updateUI() {
  document.querySelectorAll('.station').forEach(el => el.classList.toggle('active', parseInt(el.dataset.idx) === currentStationIdx));
  document.getElementById('stopBtn').classList.toggle('active', isPlaying);
}

function setLedBoard(text) {
  const board = document.getElementById('ledBoard');
  const textEl = document.getElementById('ledText');
  
  // 애니메이션 재시작을 위한 트릭
  board.classList.remove('active');
  void board.offsetWidth; 
  textEl.innerHTML = text + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;' + text; 
  board.classList.add('active');
}

function renderLineSelect() {
  const sel = document.getElementById('lineSelect');
  sel.innerHTML = '';
  Object.keys(lineData).forEach(k => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = lineData[k].name;
    sel.appendChild(opt);
  });
  sel.value = currentLine;
}

function renderAutoSelects() {
  const line = lineData[currentLine];
  const start = document.getElementById('autoStart'), end = document.getElementById('autoEnd');
  start.innerHTML = ''; end.innerHTML = '';
  line.stations.forEach((s, i) => {
    const o1 = document.createElement('option'); o1.value = i; o1.textContent = s.name; start.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = i; o2.textContent = s.name; end.appendChild(o2);
  });
  start.value = 0; end.value = line.stations.length - 1;
}

function renderLine(lineKey) {
  const line = lineData[lineKey];
  document.documentElement.style.setProperty('--line-color', line.color);
  document.querySelector('header').style.setProperty('--line-color', line.color);
  document.getElementById('lineBadge').textContent = line.badge;
  document.getElementById('lineBadge').style.background = line.color;
  document.getElementById('autoPlayBtn').style.background = line.color;
  document.getElementById('subtitle').textContent = line.name + ' · ' + line.stations.length + '개 역';
  
  const map = document.getElementById('map');
  const train = document.getElementById('trainIcon');
  map.innerHTML = ''; map.appendChild(train);
  
  const track = document.createElement('div'); track.className = 'line-track';
  map.appendChild(track);
  
  const loopStations = line.stations.filter(s => s.loopStart || s.inLoop || s.loopEnd);
  const mainStations = line.stations.filter(s => !s.loopStart && !s.inLoop && !s.loopEnd);
  
  if (loopStations.length > 0) {
    const loopBox = document.createElement('div'); loopBox.className = 'loop-section';
    loopBox.style.setProperty('--line-color', line.color);
    const label = document.createElement('div'); label.className = 'loop-label'; label.textContent = '🔁 응암순환';
    loopBox.appendChild(label);
    loopStations.forEach((s) => loopBox.appendChild(createStationElement(s, line.stations.indexOf(s), line)));
    map.appendChild(loopBox);
  }
  
  mainStations.forEach((s, i) => {
    const idx = line.stations.indexOf(s);
    const el = createStationElement(s, idx, line);
    if (i === 0 || i === mainStations.length - 1) el.querySelector('.dot').classList.add('terminal');
    map.appendChild(el);
  });
  
  hideTrain(); renderAutoSelects();
}

function createStationElement(station, idx, line) {
  const el = document.createElement('div');
  el.className = 'station'; el.dataset.idx = idx;
  el.style.setProperty('--line-color', line.color);
  
  const dot = document.createElement('div');
  dot.className = 'dot' + (station.transfers.length > 0 ? ' transfer' : '');
  el.appendChild(dot);
  
  const info = document.createElement('div'); info.className = 'station-info';
  const nameKo = document.createElement('div'); nameKo.className = 'station-name-ko'; nameKo.textContent = station.name;
  info.appendChild(nameKo);
  
  const nameEn = document.createElement('div'); nameEn.className = 'station-name-en'; nameEn.textContent = station.nameEn;
  info.appendChild(nameEn);
  
  if (station.transfers.length > 0) {
    const transfers = document.createElement('div'); transfers.className = 'transfers';
    station.transfers.forEach(t => {
      const badge = document.createElement('span'); badge.className = 'transfer-badge';
      badge.textContent = /^\d$/.test(t) ? t : (TRANSFER_BADGE[t] || t);
      badge.style.background = TRANSFER_COLORS[t] || '#9ca3af';
      transfers.appendChild(badge);
    });
    info.appendChild(transfers);
  }
  el.appendChild(info);
  
  const playIcon = document.createElement('div'); playIcon.className = 'play-icon'; playIcon.textContent = '🔊';
  el.appendChild(playIcon);
  
  el.addEventListener('click', () => { if (autoMode) return; announce(idx); });
  return el;
}

// 이벤트 리스너 세팅
document.getElementById('lineSelect').addEventListener('change', (e) => { currentLine = e.target.value; stopAnnounce(); renderLine(currentLine); });
document.getElementById('speedSelect').addEventListener('change', (e) => { speechRate = parseFloat(e.target.value); });
document.getElementById('stopBtn').addEventListener('click', stopAnnounce);
document.getElementById('autoToggleBtn').addEventListener('click', () => { document.getElementById('autoPanel').classList.toggle('open'); });
document.getElementById('autoPlayBtn').addEventListener('click', () => { ensureAudio(); startAutoRun(); });
document.addEventListener('click', () => ensureAudio(), { once: true });

// 초기화
renderLineSelect();
renderLine(currentLine);
setLedBoard('안전하고 편리한 지하철을 이용해 주셔서 감사합니다.');
</script>
